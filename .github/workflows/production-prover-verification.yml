name: Production Prover Verification

on:
  pull_request:
    paths:
      - ".github/workflows/production-prover-verification.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Dockerfile"
      - "README.md"
      - "guest/**"
      - "methods/**"
      - "rust-toolchain.toml"
      - "scripts/**"
      - "server/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/production-prover-verification.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Dockerfile"
      - "README.md"
      - "guest/**"
      - "methods/**"
      - "rust-toolchain.toml"
      - "scripts/**"
      - "server/**"
  workflow_dispatch:

jobs:
  linux-x86_64-production-build:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Add cargo and risc0 binaries to PATH
        run: |
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          echo "$HOME/.risc0/bin" >> "$GITHUB_PATH"

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            clang \
            cmake \
            libssl-dev \
            pkg-config

      - name: Install pinned host Rust toolchain
        run: |
          set -euo pipefail
          . ./scripts/production-toolchain.env
          rustup toolchain install "${HOST_RUST_VERSION}" --profile minimal --component rustfmt --component clippy
          rustc +"${HOST_RUST_VERSION}" --version
          cargo +"${HOST_RUST_VERSION}" --version

      - name: Install pinned production prover toolchain
        run: ./scripts/install-production-toolchain.sh

      - name: Build production prover
        run: |
          set -euo pipefail
          . ./scripts/production-toolchain.env
          cargo +"${HOST_RUST_VERSION}" build --release -p agenc-prover-server --features production-prover

      - name: Verify trusted image id
        run: ./scripts/verify-production-image-id.sh

      - name: Capture build metadata
        run: |
          mkdir -p dist
          target/release/agenc-prover-server image-id > dist/agenc-prover-image-id.txt
          sha256sum target/release/agenc-prover-server > dist/agenc-prover-server.sha256
          ./scripts/write-build-metadata.sh dist/production-build-metadata.json

      - name: Upload production build metadata
        uses: actions/upload-artifact@v4
        with:
          name: production-prover-build-metadata
          path: |
            dist/production-build-metadata.json
            dist/agenc-prover-image-id.txt
            dist/agenc-prover-server.sha256
